<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Férias — linha do tempo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f7f7f5; --bg-tertiary: #f0efeb;
    --text-primary: #1a1a18; --text-secondary: #6b6a65; --text-tertiary: #9b9a96;
    --border-t: rgba(0,0,0,0.10); --border-s: rgba(0,0,0,0.18);
    --radius-md: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c; --bg-secondary: #2a2a28; --bg-tertiary: #242422;
      --text-primary: #f0efe9; --text-secondary: #9b9a96; --text-tertiary: #6b6a65;
      --border-t: rgba(255,255,255,0.10); --border-s: rgba(255,255,255,0.18);
    }
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 2rem 1.5rem; }
  .container { max-width: 1100px; margin: 0 auto; }
  input, select { background: var(--bg-secondary); border: 0.5px solid var(--border-s); border-radius: var(--radius-md); padding: 7px 10px; font-size: 13px; color: var(--text-primary); font-family: var(--font); width: 100%; outline: none; }
  input:focus, select:focus { box-shadow: 0 0 0 2px rgba(55,138,221,0.25); }
  .btn { padding: 7px 16px; border: 0.5px solid var(--border-s); border-radius: var(--radius-md); background: transparent; font-size: 13px; cursor: pointer; color: var(--text-primary); font-family: var(--font); transition: background 0.12s; }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--text-primary); color: var(--bg-primary); border-color: transparent; }
  .btn-primary:hover { opacity: 0.82; background: var(--text-primary); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: var(--bg-primary); border: 0.5px solid var(--border-t); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 420px; }
  .field { margin-bottom: 0.875rem; }
  .field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gantt-wrap { background: var(--bg-primary); border: 0.5px solid var(--border-t); border-radius: var(--radius-lg); overflow: hidden; }
  .gantt-header { display: flex; border-bottom: 0.5px solid var(--border-t); }
  .name-col-hdr { width: 200px; flex-shrink: 0; padding: 8px 12px; font-size: 11px; font-weight: 500; color: var(--text-secondary); border-right: 0.5px solid var(--border-t); }
  .months-hdr { flex: 1; display: flex; overflow: hidden; }
  .month-cell { flex: 1; padding: 8px 6px; font-size: 11px; font-weight: 500; color: var(--text-secondary); text-align: center; border-right: 0.5px solid var(--border-t); }
  .month-cell:last-child { border-right: none; }
  .gantt-row { display: flex; border-bottom: 0.5px solid var(--border-t); align-items: center; min-height: 44px; }
  .gantt-row:last-child { border-bottom: none; }
  .gantt-row:not(.dept-sep):hover { background: var(--bg-secondary); }
  .name-cell { width: 200px; flex-shrink: 0; padding: 5px 10px; border-right: 0.5px solid var(--border-t); display: flex; align-items: center; gap: 6px; }
  .person { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dept-pill { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 500; }
  .days-label { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .timeline-cell { flex: 1; position: relative; height: 44px; }
  .bar { position: absolute; height: 18px; top: 13px; border-radius: 3px; display: flex; align-items: center; padding: 0 6px; font-size: 10px; white-space: nowrap; overflow: hidden; cursor: default; }
  .dept-sep { background: var(--bg-secondary); min-height: 26px !important; }
  .today-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #E24B4A; opacity: 0.6; pointer-events: none; }
  .del-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 2px; color: var(--text-tertiary); line-height: 1; flex-shrink: 0; }
  .del-btn:hover { color: #A32D2D; }
  .empty-gantt { text-align: center; padding: 2.5rem; font-size: 13px; color: var(--text-secondary); }
  .legend-wrap { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1rem; font-size: 12px; color: var(--text-secondary); align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .err { font-size: 12px; color: #A32D2D; margin-top: 5px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #639922; display: inline-block; margin-right: 5px; }
  .status-dot.loading { background: #EF9F27; }
  .status-dot.error { background: #E24B4A; }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
      <span style="font-size:16px;font-weight:500;color:var(--text-primary)">Férias — linha do tempo</span>
      <span style="font-size:13px;color:var(--text-secondary)">2026</span>
      <span style="font-size:11px;color:var(--text-secondary);display:flex;align-items:center">
        <span class="status-dot loading" id="status-dot"></span><span id="status-text">conectando...</span>
      </span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="filter-dept" style="width:auto;font-size:12px;padding:5px 8px" onchange="render()">
        <option value="">Todos os departamentos</option>
      </select>
      <button class="btn" style="display:flex;align-items:center;gap:5px" onclick="openModal()">
        <span style="font-size:18px;line-height:1;color:var(--text-secondary)">+</span> Adicionar
      </button>
    </div>
  </div>
  <div id="legend-area" class="legend-wrap"></div>
  <div class="gantt-wrap">
    <div class="gantt-header">
      <div class="name-col-hdr">Colaborador</div>
      <div class="months-hdr" id="month-headers"></div>
    </div>
    <div id="gantt-body"><div class="empty-gantt">Carregando...</div></div>
  </div>
</div>
<div id="modal-area"></div>
<script>
const SUPABASE_URL = 'https://nbaluttwauutqomihavo.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iYWx1dHR3YXV1dHFvbWloYXZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTc1ODMsImV4cCI6MjA5MTE3MzU4M30.0RQDJ6A77Wiy8VCkXAoaLJNKDzg60SBVpiWyXLb8zVg';
const TABLE = 'ferias';
const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const YEAR = 2026;
const DEPTS = {
  'Logística':  {bg:'#E6F1FB',text:'#0C447C',bar:'#378ADD',barText:'#E6F1FB'},
  'Serviços':   {bg:'#EEEDFE',text:'#3C3489',bar:'#7F77DD',barText:'#EEEDFE'},
  'RH':         {bg:'#FBEAF0',text:'#72243E',bar:'#D4537E',barText:'#FBEAF0'},
  'Diretoria':  {bg:'#FAEEDA',text:'#633806',bar:'#EF9F27',barText:'#633806'},
  'Marketing':  {bg:'#FAECE7',text:'#712B13',bar:'#D85A30',barText:'#FAECE7'},
  'Finanças':   {bg:'#EAF3DE',text:'#27500A',bar:'#639922',barText:'#EAF3DE'},
  'GR':         {bg:'#E1F5EE',text:'#085041',bar:'#1D9E75',barText:'#E1F5EE'},
  'Suporte':    {bg:'#F1EFE8',text:'#444441',bar:'#5F5E5A',barText:'#F1EFE8'},
  'Powerbanks': {bg:'#CECBF6',text:'#26215C',bar:'#534AB7',barText:'#CECBF6'},
  'Legal':      {bg:'#F7C1C1',text:'#501313',bar:'#A32D2D',barText:'#F7C1C1'},
  'PR':         {bg:'#F4C0D1',text:'#4B1528',bar:'#993556',barText:'#F4C0D1'},
};
const FB = {bg:'#F1EFE8',text:'#444441',bar:'#888780',barText:'#F1EFE8'};
const pal = d => DEPTS[d]||FB;

let entries = [];
const yS = new Date(YEAR,0,1), yE = new Date(YEAR,11,31);
const tD = (yE-yS)/864e5+1;
const off = d => Math.max(0,Math.min(tD,(new Date(d)-yS)/864e5));
const entryDays = e => Math.round((new Date(e.end_date)-new Date(e.start_date))/864e5)+1;

async function req(path, opts={}) {
  const h = {'apikey':ANON_KEY,'Authorization':'Bearer '+ANON_KEY,'Content-Type':'application/json'};
  if(opts.prefer) h['Prefer'] = opts.prefer;
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+path, {...opts, headers:{...h,...(opts.headers||{})}});
  if(!r.ok) throw new Error(await r.text());
  return r.status===204?null:r.json();
}

async function load() {
  setS('loading');
  try {
    entries = await req(TABLE+'?order=dept,last,first,start_date');
    setS('ok'); render();
  } catch(e) {
    setS('error');
    document.getElementById('gantt-body').innerHTML='<div class="empty-gantt" style="color:#A32D2D">Erro: '+e.message+'</div>';
  }
}

function setS(s) {
  document.getElementById('status-dot').className='status-dot'+(s==='loading'?' loading':s==='error'?' error':'');
  document.getElementById('status-text').textContent=s==='ok'?'sincronizado':s==='loading'?'conectando...':'erro de conexão';
}

function groupByPerson(data) {
  const map = new Map();
  data.forEach(e => {
    const key = e.first+'|'+e.last+'|'+e.dept;
    if(!map.has(key)) map.set(key, {first:e.first, last:e.last, dept:e.dept, periods:[]});
    map.get(key).periods.push(e);
  });
  return [...map.values()];
}

function render() {
  const sel=document.getElementById('filter-dept'), cur=sel.value;
  const depts=[...new Set(entries.map(e=>e.dept))].sort((a,b)=>a.localeCompare(b,'pt'));
  sel.innerHTML='<option value="">Todos os departamentos</option>'+depts.map(d=>`<option value="${d}"${d===cur?' selected':''}>${d}</option>`).join('');

  let data=[...entries];
  if(cur) data=data.filter(e=>e.dept===cur);
  data.sort((a,b)=>a.dept.localeCompare(b.dept,'pt')||(a.last+a.first).localeCompare(b.last+b.first));

  const people = groupByPerson(data);

  document.getElementById('month-headers').innerHTML=MONTHS.map(m=>`<div class="month-cell">${m}</div>`).join('');
  const tp=((off(new Date().toISOString().slice(0,10))/tD)*100).toFixed(2);
  const body=document.getElementById('gantt-body');

  if(!people.length){body.innerHTML='<div class="empty-gantt">Nenhum registro.</div>';legend();return;}

  let html='', prev=null;
  people.forEach(person => {
    const c = pal(person.dept);
    if(person.dept !== prev) {
      html+=`<div class="gantt-row dept-sep" style="border-bottom:0.5px solid var(--border-t)">
        <div style="width:200px;flex-shrink:0;padding:3px 12px;font-size:11px;font-weight:500;color:${c.text};border-right:0.5px solid var(--border-t)">${person.dept}</div>
        <div style="flex:1;position:relative;height:26px"><div class="today-line" style="left:${tp}%"></div></div>
      </div>`;
      prev = person.dept;
    }

    const totalD = person.periods.reduce((s,e)=>s+entryDays(e),0);
    const ids = person.periods.map(e=>e.id).join(',');

    const bars = person.periods.map(e => {
      const sp=((off(e.start_date)/tD)*100).toFixed(2);
      const wp=Math.max(0.5,((off(e.end_date)-off(e.start_date)+1)/tD)*100).toFixed(2);
      const d=entryDays(e);
      const lbl=d>5?`${d}d`:`${d}d`;
      return `<div class="bar" title="${e.start_date} — ${e.end_date} (${d} dias)" style="left:${sp}%;width:${wp}%;background:${c.bar};color:${c.barText}">${lbl}</div>`;
    }).join('');

    html+=`<div class="gantt-row">
      <div class="name-cell">
        <div style="flex:1;min-width:0">
          <div class="person">${person.first} ${person.last}</div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
            <span class="dept-pill" style="background:${c.bg};color:${c.text}">${person.dept}</span>
            <span class="days-label">${totalD} dias</span>
          </div>
        </div>
        <button class="del-btn" onclick="delPerson('${person.first}','${person.last}','${person.dept}')" title="Remover todos os períodos">&#215;</button>
      </div>
      <div class="timeline-cell">
        <div class="today-line" style="left:${tp}%"></div>
        ${bars}
      </div>
    </div>`;
  });

  body.innerHTML=html; legend();
}

function legend() {
  const depts=[...new Set(entries.map(e=>e.dept))].sort((a,b)=>a.localeCompare(b,'pt'));
  document.getElementById('legend-area').innerHTML=depts.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${pal(d).bar}"></div><span>${d}</span></div>`).join('')+
  `<div class="legend-item" style="margin-left:auto"><div style="width:2px;height:12px;border-radius:1px;background:#E24B4A;flex-shrink:0"></div><span>Hoje</span></div>`;
}

function openModal(){
  const opts=Object.keys(DEPTS).map(d=>`<option value="${d}">`).join('');
  document.getElementById('modal-area').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div style="font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:1.25rem">Registrar férias</div>
    <div class="row2">
      <div class="field"><label>Nome</label><input id="f-first" placeholder="João" autocomplete="off"></div>
      <div class="field"><label>Sobrenome</label><input id="f-last" placeholder="Silva" autocomplete="off"></div>
    </div>
    <div class="field"><label>Departamento</label><input id="f-dept" list="dl" placeholder="Logística" autocomplete="off"><datalist id="dl">${opts}</datalist></div>
    <div class="row2">
      <div class="field"><label>Início</label><input type="date" id="f-start"></div>
      <div class="field"><label>Fim</label><input type="date" id="f-end"></div>
    </div>
    <div id="f-err" class="err"></div>
    <div style="display:flex;gap:8px;margin-top:0.75rem">
      <button class="btn btn-primary" id="save-btn" onclick="save()">Adicionar</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
    </div>
  </div></div>`;
  document.getElementById('f-first').focus();
}

function closeModal(){document.getElementById('modal-area').innerHTML='';}

async function save(){
  const first=document.getElementById('f-first').value.trim();
  const last=document.getElementById('f-last').value.trim();
  const dept=document.getElementById('f-dept').value.trim();
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const err=document.getElementById('f-err');
  if(!first||!last){err.textContent='Informe nome e sobrenome';return;}
  if(!dept){err.textContent='Informe o departamento';return;}
  if(!start||!end){err.textContent='Informe as datas';return;}
  if(start>end){err.textContent='Data de início posterior ao fim';return;}
  const btn=document.getElementById('save-btn');
  btn.textContent='Salvando...';btn.disabled=true;
  try{
    const data=await req(TABLE,{method:'POST',prefer:'return=representation',body:JSON.stringify({first,last,dept,start_date:start,end_date:end})});
    entries.push(Array.isArray(data)?data[0]:data);
    closeModal();render();
  }catch(e){
    err.textContent='Erro: '+e.message;
    btn.textContent='Adicionar';btn.disabled=false;
  }
}

async function delPerson(first, last, dept){
  if(!confirm(`Remover todos os períodos de ${first} ${last}?`))return;
  const toDelete = entries.filter(e=>e.first===first&&e.last===last&&e.dept===dept);
  try{
    for(const e of toDelete){
      await req(TABLE+'?id=eq.'+e.id,{method:'DELETE'});
    }
    entries=entries.filter(e=>!(e.first===first&&e.last===last&&e.dept===dept));
    render();
  }catch(e){alert('Erro: '+e.message);}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
load();
setInterval(load,30000);
</script>
</body>
</html>
