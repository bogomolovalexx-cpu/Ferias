<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Férias — linha do tempo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f7f5;
    --bg-tertiary: #f0efeb;
    --text-primary: #1a1a18;
    --text-secondary: #6b6a65;
    --text-tertiary: #9b9a96;
    --border-tertiary: rgba(0,0,0,0.10);
    --border-secondary: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-tertiary: #242422;
      --text-primary: #f0efe9;
      --text-secondary: #9b9a96;
      --text-tertiary: #6b6a65;
      --border-tertiary: rgba(255,255,255,0.10);
      --border-secondary: rgba(255,255,255,0.18);
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  .container { max-width: 1100px; margin: 0 auto; }

  input, select {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    padding: 7px 10px;
    font-size: 13px;
    color: var(--text-primary);
    font-family: var(--font);
    width: 100%;
    outline: none;
  }
  input:focus, select:focus { box-shadow: 0 0 0 2px rgba(55,138,221,0.25); }

  .btn {
    padding: 7px 16px;
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    background: transparent;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-primary);
    font-family: var(--font);
    transition: background 0.12s;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--text-primary); color: var(--bg-primary); border-color: transparent; }
  .btn-primary:hover { opacity: 0.82; background: var(--text-primary); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .modal {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: 100%; max-width: 420px;
  }

  .field { margin-bottom: 0.875rem; }
  .field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .gantt-wrap {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .gantt-header { display: flex; border-bottom: 0.5px solid var(--border-tertiary); }
  .gantt-name-col {
    width: 190px; flex-shrink: 0;
    padding: 8px 12px;
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    border-right: 0.5px solid var(--border-tertiary);
  }
  .gantt-months { flex: 1; display: flex; overflow: hidden; }
  .month-cell {
    flex: 1; padding: 8px 6px;
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    text-align: center;
    border-right: 0.5px solid var(--border-tertiary);
  }
  .month-cell:last-child { border-right: none; }

  .gantt-row {
    display: flex;
    border-bottom: 0.5px solid var(--border-tertiary);
    align-items: center;
    min-height: 44px;
  }
  .gantt-row:last-child { border-bottom: none; }
  .gantt-row:not(.dept-sep):hover { background: var(--bg-secondary); }

  .name-cell {
    width: 190px; flex-shrink: 0;
    padding: 5px 10px;
    border-right: 0.5px solid var(--border-tertiary);
    display: flex; align-items: center; gap: 6px;
  }
  .person { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dept-pill { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 500; }
  .days-label { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

  .timeline-cell { flex: 1; position: relative; height: 44px; }
  .bar {
    position: absolute; height: 18px; top: 13px;
    border-radius: 3px;
    display: flex; align-items: center;
    padding: 0 6px; font-size: 10px;
    white-space: nowrap; overflow: hidden;
    cursor: default;
  }
  .dept-sep { background: var(--bg-secondary); min-height: 26px !important; }
  .today-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #E24B4A; opacity: 0.6; pointer-events: none; }

  .del-btn {
    background: none; border: none; cursor: pointer;
    font-size: 14px; padding: 0 2px;
    color: var(--text-tertiary); line-height: 1; flex-shrink: 0;
  }
  .del-btn:hover { color: #A32D2D; }

  .empty-gantt { text-align: center; padding: 2.5rem; font-size: 13px; color: var(--text-secondary); }

  .legend-wrap { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1rem; font-size: 12px; color: var(--text-secondary); align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .err { font-size: 12px; color: #A32D2D; margin-top: 5px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .top-bar-left { display: flex; align-items: baseline; gap: 10px; }
  .top-bar-right { display: flex; gap: 8px; align-items: center; }
  .title { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .subtitle { font-size: 13px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="top-bar-left">
      <span class="title">Férias — linha do tempo</span>
      <span class="subtitle">2026</span>
    </div>
    <div class="top-bar-right">
      <select id="filter-dept" style="width:auto;font-size:12px;padding:5px 8px" onchange="render()">
        <option value="">Todos os departamentos</option>
      </select>
      <button class="btn" style="display:flex;align-items:center;gap:5px" onclick="openModal()">
        <span style="font-size:18px;line-height:1;color:var(--text-secondary)">+</span> Adicionar
      </button>
    </div>
  </div>

  <div id="legend-area" class="legend-wrap"></div>

  <div class="gantt-wrap">
    <div class="gantt-header">
      <div class="gantt-name-col">Colaborador</div>
      <div class="gantt-months" id="month-headers"></div>
    </div>
    <div id="gantt-body"></div>
  </div>

</div>

<div id="modal-area"></div>

<script>
const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const YEAR=2026;

const DEPTS={
  'Logística':  {bg:'#E6F1FB',border:'#378ADD',text:'#0C447C',bar:'#378ADD',barText:'#E6F1FB'},
  'Serviços':   {bg:'#EEEDFE',border:'#7F77DD',text:'#3C3489',bar:'#7F77DD',barText:'#EEEDFE'},
  'RH':         {bg:'#FBEAF0',border:'#D4537E',text:'#72243E',bar:'#D4537E',barText:'#FBEAF0'},
  'Diretoria':  {bg:'#FAEEDA',border:'#EF9F27',text:'#633806',bar:'#EF9F27',barText:'#633806'},
  'Marketing':  {bg:'#FAECE7',border:'#D85A30',text:'#712B13',bar:'#D85A30',barText:'#FAECE7'},
  'Finanças':   {bg:'#EAF3DE',border:'#639922',text:'#27500A',bar:'#639922',barText:'#EAF3DE'},
  'GR':         {bg:'#E1F5EE',border:'#1D9E75',text:'#085041',bar:'#1D9E75',barText:'#E1F5EE'},
  'Suporte':    {bg:'#F1EFE8',border:'#888780',text:'#444441',bar:'#5F5E5A',barText:'#F1EFE8'},
  'Powerbanks': {bg:'#CECBF6',border:'#534AB7',text:'#26215C',bar:'#534AB7',barText:'#CECBF6'},
  'Legal':      {bg:'#F7C1C1',border:'#A32D2D',text:'#501313',bar:'#A32D2D',barText:'#F7C1C1'},
  'PR':         {bg:'#F4C0D1',border:'#993556',text:'#4B1528',bar:'#993556',barText:'#F4C0D1'},
};
const FALLBACK={bg:'#F1EFE8',border:'#888780',text:'#444441',bar:'#888780',barText:'#F1EFE8'};
function palette(d){return DEPTS[d]||FALLBACK;}

let entries=[
  {id:'2',first:'Ismael',last:'Farias Arenas',dept:'Logística',start:'2026-07-07',end:'2026-07-20'},
  {id:'3',first:'Joan',last:'Naranjo Ospina',dept:'Logística',start:'2026-08-10',end:'2026-08-28'},
  {id:'4',first:'Maksim',last:'Komlichenko',dept:'Logística',start:'2026-06-15',end:'2026-06-30'},
  {id:'5',first:'Andrei',last:'Duben',dept:'Diretoria',start:'2026-09-01',end:'2026-09-15'},
  {id:'6',first:'Claudio',last:'Saraos',dept:'RH',start:'2026-05-05',end:'2026-05-16'},
];

const yearStart=new Date(YEAR,0,1);
const yearEnd=new Date(YEAR,11,31);
const totalDays=(yearEnd-yearStart)/864e5+1;

function dayOffset(d){return Math.max(0,Math.min(totalDays,(new Date(d)-yearStart)/864e5));}
function calDays(e){return Math.round((new Date(e.end)-new Date(e.start))/864e5)+1;}
function totalDaysForPerson(first,last,dept){
  return entries.filter(e=>e.first===first&&e.last===last&&e.dept===dept).reduce((s,e)=>s+calDays(e),0);
}

function syncDeptFilter(){
  const sel=document.getElementById('filter-dept');
  const cur=sel.value;
  const depts=[...new Set(entries.map(e=>e.dept))].sort((a,b)=>a.localeCompare(b,'pt'));
  sel.innerHTML='<option value="">Todos os departamentos</option>'+
    depts.map(d=>`<option value="${d}"${d===cur?' selected':''}>${d}</option>`).join('');
}

function render(){
  syncDeptFilter();
  const fd=document.getElementById('filter-dept').value;
  let data=[...entries];
  if(fd) data=data.filter(e=>e.dept===fd);
  data.sort((a,b)=>a.dept.localeCompare(b.dept,'pt')||(a.last+a.first).localeCompare(b.last+b.first));

  document.getElementById('month-headers').innerHTML=
    MONTHS.map(m=>`<div class="month-cell">${m}</div>`).join('');

  const todayStr=new Date().toISOString().slice(0,10);
  const todayPct=((dayOffset(todayStr)/totalDays)*100).toFixed(2);

  const body=document.getElementById('gantt-body');
  if(!data.length){
    body.innerHTML='<div class="empty-gantt">Nenhum registro. Adicione as primeiras férias.</div>';
    renderLegend();return;
  }

  let html='';
  let prevDept=null;
  data.forEach(e=>{
    const p=palette(e.dept);
    if(e.dept!==prevDept){
      html+=`<div class="gantt-row dept-sep" style="border-bottom:0.5px solid var(--border-tertiary)">
        <div style="width:190px;flex-shrink:0;padding:3px 12px;font-size:11px;font-weight:500;color:${p.text};border-right:0.5px solid var(--border-tertiary)">${e.dept}</div>
        <div style="flex:1;position:relative;height:26px"><div class="today-line" style="left:${todayPct}%"></div></div>
      </div>`;
      prevDept=e.dept;
    }
    const totalD=totalDaysForPerson(e.first,e.last,e.dept);
    const startPct=((dayOffset(e.start)/totalDays)*100).toFixed(2);
    const widthPct=Math.max(0.5,((dayOffset(e.end)-dayOffset(e.start)+1)/totalDays)*100).toFixed(2);
    const days=calDays(e);
    const label=days>5?`${e.first} ${e.last} · ${days}d`:`${days}d`;
    html+=`<div class="gantt-row">
      <div class="name-cell">
        <div style="flex:1;min-width:0">
          <div class="person">${e.first} ${e.last}</div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
            <span class="dept-pill" style="background:${p.bg};color:${p.text}">${e.dept}</span>
            <span class="days-label">${totalD} dias</span>
          </div>
        </div>
        <button class="del-btn" onclick="del('${e.id}')">&#215;</button>
      </div>
      <div class="timeline-cell">
        <div class="today-line" style="left:${todayPct}%"></div>
        <div class="bar" title="${e.start} — ${e.end} (${days} dias)"
          style="left:${startPct}%;width:${widthPct}%;background:${p.bar};color:${p.barText}">
          ${label}
        </div>
      </div>
    </div>`;
  });
  body.innerHTML=html;
  renderLegend();
}

function renderLegend(){
  const depts=[...new Set(entries.map(e=>e.dept))].sort((a,b)=>a.localeCompare(b,'pt'));
  const leg=document.getElementById('legend-area');
  if(!depts.length){leg.innerHTML='';return;}
  leg.innerHTML=depts.map(d=>{
    const p=palette(d);
    return `<div class="legend-item"><div class="legend-dot" style="background:${p.bar}"></div><span>${d}</span></div>`;
  }).join('')+
  `<div class="legend-item" style="margin-left:auto"><div style="width:2px;height:12px;border-radius:1px;background:#E24B4A;flex-shrink:0"></div><span>Hoje</span></div>`;
}

function openModal(){
  const deptOptions=Object.keys(DEPTS).map(d=>`<option value="${d}">`).join('');
  document.getElementById('modal-area').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div style="font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:1.25rem">Registrar férias</div>
      <div class="row2">
        <div class="field"><label>Nome</label><input id="f-first" placeholder="João" autocomplete="off"></div>
        <div class="field"><label>Sobrenome</label><input id="f-last" placeholder="Silva" autocomplete="off"></div>
      </div>
      <div class="field"><label>Departamento</label>
        <input id="f-dept" list="dept-list" placeholder="Logística" autocomplete="off">
        <datalist id="dept-list">${deptOptions}</datalist>
      </div>
      <div class="row2">
        <div class="field"><label>Início</label><input type="date" id="f-start"></div>
        <div class="field"><label>Fim</label><input type="date" id="f-end"></div>
      </div>
      <div id="f-err" class="err"></div>
      <div style="display:flex;gap:8px;margin-top:0.75rem">
        <button class="btn btn-primary" onclick="save()">Adicionar</button>
        <button class="btn" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('f-first').focus();
}

function closeModal(){document.getElementById('modal-area').innerHTML='';}

function save(){
  const first=document.getElementById('f-first').value.trim();
  const last=document.getElementById('f-last').value.trim();
  const dept=document.getElementById('f-dept').value.trim();
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const err=document.getElementById('f-err');
  if(!first||!last){err.textContent='Informe nome e sobrenome';return;}
  if(!dept){err.textContent='Informe o departamento';return;}
  if(!start||!end){err.textContent='Informe as datas';return;}
  if(start>end){err.textContent='Data de início posterior ao fim';return;}
  entries.push({id:Date.now().toString(),first,last,dept,start,end});
  closeModal();
  render();
}

function del(id){entries=entries.filter(e=>e.id!==id);render();}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

render();
</script>
</body>
</html>
